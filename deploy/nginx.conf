server {
    listen 80;
    server_name rocketlauncher.space;

    root /opt/spacerocketlauncher;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # SEO files
    location = /robots.txt {
        try_files /robots.txt =404;
    }
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }
    location = /yandex_a4530d04ae51bb11.html {
        try_files /yandex_a4530d04ae51bb11.html =404;
    }
    location = /google99c234b93909267b.html {
        try_files /google99c234b93909267b.html =404;
    }

    # Static HTML simulator
    location = /simulator {
        try_files /simulator.html =404;
    }

    # Streamlit simulator
    location /streamlit/ {
        proxy_pass http://127.0.0.1:8501/streamlit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Streamlit Lagrange
    location /lagrange/ {
        proxy_pass http://127.0.0.1:8502/lagrange/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
